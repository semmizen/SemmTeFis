<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SemmTeFis</title><link
    rel="stylesheet"
    href="style.css"></head><body><header class="topbar"><div class="logo">
    SemmTeFis
</div>

<div class="controls">

    <select id="themeSelect">

        <option>
            VS Code Dark
        </option>

        <option>
            Dracula
        </option>

        <option>
            AMOLED
        </option>

        <option>
            Light
        </option>

    </select>

    <select id="languageSelect">

        <option>
            HTML
        </option>

        <option>
            CSS
        </option>

        <option>
            JavaScript
        </option>

        <option>
            Lua
        </option>

    </select>

</div>

</header><div class="toolbar"><button id="undoBtn">
    ↶ Undo
</button>

<button id="redoBtn">
    ↷ Redo
</button>

<button id="saveBtn">
    💾 Save
</button>

<button id="runBtn">
    ▶ Run
</button>

<button id="downloadBtn">
    ⬇ Download
</button>

<button id="fullscreenBtn">
    ⛶ Preview
</button>

<button id="rawBtn">
    RAW
</button>

</div><div class="workspace"><div class="sidebar">

    <div class="file active">
        index.html
    </div>

    <div class="file">
        style.css
    </div>

    <div class="file">
        script.js
    </div>

</div>

<div id="editor"></div>

<iframe
    id="preview">
</iframe>

</div><div id="saveStatus">
    Ready
</div><div id="console">
    Console Ready
</div><div id="rawModal"><div class="modalContent">

    <input
        id="scriptName"
        placeholder="Script Name">

    <input
        id="confirmName"
        placeholder="Confirm Name">

    <input
        id="adminSecret"
        placeholder="Admin Secret">

    <button id="createRawBtn">
        Create Raw
    </button>

</div>

</div><script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script><script src="script.js"></script></body></html>
